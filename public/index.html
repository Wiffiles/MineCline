<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MineCline Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-glow"></div>

<nav>
  <div class="nav-brand">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
    <span>Mine</span>Cline
  </div>
  <div class="nav-links">
    <button class="nav-btn active" data-view="status">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>
      Status
    </button>
    <button class="nav-btn" data-view="crp">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/><line x1="8" y1="7" x2="16" y2="7"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
      CRP
    </button>
  </div>
  <div class="nav-status" id="navStatus">
    <span class="nav-status-dot"></span>
    <span class="nav-status-text">Disconnected</span>
  </div>
</nav>

<div id="view-status" class="view active">
  <div class="view-header">
    <div class="view-title">Bot Status</div>
    <div class="view-subtitle">Real-time overview of all connected bots</div>
  </div>
  <div class="status-grid" id="statusGrid"></div>
  <div class="modal-overlay" id="botModal">
    <div class="modal" id="botModalContent"></div>
  </div>
</div>

<div id="view-crp" class="view">
  <div class="crp-layout">
    <div class="crp-sidebar">
      <div class="panel">
        <div class="panel-header">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          Bot Groups
        </div>
        <div id="groupsPanel" class="panel-body"></div>
      </div>
      <div class="panel">
        <div class="panel-header">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
          Bot List
        </div>
        <div class="panel-body">
          <div class="filter-bar">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="active">Active</button>
            <button class="filter-btn" data-filter="dead">Dead</button>
          </div>
          <div id="botList" class="bot-list"></div>
        </div>
      </div>
      <div class="panel">
        <div class="panel-header">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
          Quick Presets
        </div>
        <div class="panel-body presets" id="presetsPanel"></div>
      </div>
    </div>

    <div class="crp-main">
      <div class="crp-topbar">
        <div class="stat-cards">
          <div class="stat-card">
            <svg class="stat-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            <span class="stat-label">Total</span>
            <span id="statTotal" class="stat-value">0</span>
          </div>
          <div class="stat-card">
            <svg class="stat-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
            <span class="stat-label">Active</span>
            <span id="statActive" class="stat-value green">0</span>
          </div>
          <div class="stat-card">
            <svg class="stat-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
            <span class="stat-label">Top Server</span>
            <span id="statTopServer" class="stat-value accent">-</span>
          </div>
        </div>
        <div class="server-list" id="serverList"></div>
      </div>

      <div class="crp-content">
        <div class="panel chart-panel">
          <div class="panel-header">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
            Player Count
            <span class="panel-sub" id="selectedBotGraph">(select a bot)</span>
          </div>
          <div class="panel-body chart-body"><canvas id="playerChart"></canvas></div>
        </div>
        <div class="panel alert-panel">
          <div class="panel-header">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
            Alert Log
          </div>
          <div class="panel-body scroll" id="alertLog"></div>
        </div>
      </div>

      <div class="crp-chat">
        <div class="panel cmd-panel">
          <div class="panel-header">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
            Command History
          </div>
          <div class="panel-body scroll" id="commandHistory"></div>
        </div>
        <div class="panel msg-panel">
          <div class="panel-header">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            <span>Message Log</span>
            <div class="saved-cmds" id="savedCommands"></div>
          </div>
          <div class="panel-body scroll" id="messageLog"></div>
          <div class="chat-input-bar">
            <select id="targetSelect" class="target-select" multiple></select>
            <input type="text" id="chatInput" placeholder="Type a message or /command..." class="chat-input" spellcheck="false">
            <button id="chatSend" class="btn-primary">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
              Send
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<canvas id="chartJs" style="display:none"></canvas>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="app.js"></script>
</body>
</html>
